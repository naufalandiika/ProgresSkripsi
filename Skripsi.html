<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard Monitoring Skripsi</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  padding:40px;
  color:white;
}

h1{
  text-align:center;
  margin-bottom:20px;
  font-size:36px;
}

.info-box{
  margin-bottom:5px;
  font-size:15px;
}

.summary{
  background:white;
  color:#333;
  padding:25px;
  border-radius:20px;
  margin-top: 20px;
  margin-bottom:20px;
  box-shadow:0 15px 30px rgba(0,0,0,0.2);
}

.progress-container{
  height:25px;
  background:#ddd;
  border-radius:20px;
  overflow:hidden;
  margin-top:20px;
}

.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00c6ff,#0072ff);
  text-align:center;
  color:white;
  font-size:14px;
  transition:1s;
}

.card{
  background:white;
  color:#333;
  padding:25px;
  border-radius:20px;
  margin-bottom:25px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.status{
  display:inline-block;
  padding:5px 15px;
  border-radius:20px;
  font-size:13px;
  margin-top:5px;
}

.selesai{background:#2ecc71;color:white;}
.proses{background:#f39c12;color:white;}
.belum{background:#e74c3c;color:white;}

textarea{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
  resize:none;
}

button{
  margin-top:10px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#2a5298;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#1e3c72;
}

.loader{
  text-align:center;
  font-size:18px;
}

</style>
</head>
<body>

<h1>Dashboard Monitoring Skripsi
</h1>

<div class="info-box">
  <p><strong>Dosen Pembimbing:</strong> Bapak Suprayitno, S.ST., Ak., M.T.</p>
  <p><strong>Mahasiswa:</strong> Naufal Andika Syarif Udi</p>
</div>


<div class="summary">
  <h2>Progress Keseluruhan</h2>
  <div class="progress-container">
    <div class="progress-bar" id="overallBar">0%</div>
  </div>
</div>

<div id="content">
  <div class="loader">Memuat data...</div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxH1Nylhmp5sTUyhxIOTvO55eo1wslCxARaigezSrNbmwv_XxtSDWxlI39gmo5uzyiQ5w/exec"; // GANTI DISINI

async function loadData(){
  try{
    const res = await fetch(API_URL);
    const data = await res.json();

    let html="";
    let total=0;
    let count=0;

    for(let i=1;i<data.length;i++){

      let tahap=data[i][0];
      let status=data[i][1];
      let catMhs=data[i][2];
      let catDos=data[i][3];
      let persen=parseInt(data[i][5]) || 0;

      total+=persen;
      count++;

      let statusClass="";
      if(status.toLowerCase()=="selesai") statusClass="selesai";
      else if(status.toLowerCase()=="proses") statusClass="proses";
      else statusClass="belum";

      html+=`
      <div class="card">
        <h3>${tahap}</h3>
        <span class="status ${statusClass}">${status}</span>
        <p style="margin-top:10px;"><b>Progress:</b> ${persen}%</p>

        <div class="progress-container">
          <div class="progress-bar" style="width:${persen}%">${persen}%</div>
        </div>

        <p style="margin-top:15px;"><b>Catatan Mahasiswa:</b><br>${catMhs || "-"}</p>

        <p style="margin-top:10px;"><b>Catatan Dosen:</b></p>
        <textarea id="note_${i}" rows="3">${catDos || ""}</textarea>
        <button onclick="updateNote(${i+1})">Simpan Catatan</button>
      </div>
      `;
    }

    document.getElementById("content").innerHTML=html;

    let overall=Math.round(total/count) || 0;
    let bar=document.getElementById("overallBar");
    bar.style.width=overall+"%";
    bar.innerText=overall+"%";

  }catch(err){
    document.getElementById("content").innerHTML=
    "<div class='loader'>Gagal mengambil data. Cek API URL.</div>";
  }
}

async function updateNote(row){

  const note=document.getElementById("note_"+(row-1)).value;

  await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      action:"update_dosen",
      row:row,
      catatan_dosen:note
    })
  });

  alert("Catatan berhasil disimpan!");
}

loadData();

</script>

</body>
</html>
