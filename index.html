<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard Monitoring Skripsi</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  padding:40px;
  color:white;
}

h1{
  text-align:center;
  margin-bottom:20px;
}

.summary{
  background:white;
  color:#333;
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
}

.progress-container{
  height:25px;
  background:#ddd;
  border-radius:20px;
  overflow:hidden;
  margin-top:10px;
}

.progress-bar{
  height:100%;
  background:linear-gradient(90deg,#00c6ff,#0072ff);
  text-align:center;
  color:white;
  transition:1s;
}

.card{
  background:white;
  color:#333;
  padding:20px;
  border-radius:20px;
  margin-bottom:25px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.status{
  padding:5px 15px;
  border-radius:20px;
  font-size:13px;
  display:inline-block;
  margin-top:5px;
}

.selesai{background:#2ecc71;color:white;}
.proses{background:#f39c12;color:white;}
.belum{background:#e74c3c;color:white;}

.chat-box{
  background:#f4f6f9;
  padding:10px;
  border-radius:10px;
  max-height:200px;
  overflow-y:auto;
  margin-top:10px;
}

.bubble{
  padding:8px 12px;
  border-radius:15px;
  margin:5px 0;
  display:inline-block;
  max-width:80%;
  font-size:13px;
}

.dosen{
  background:#e3f2fd;
  text-align:left;
}

.mahasiswa{
  background:#c8e6c9;
  float:right;
  clear:both;
}

textarea{
  width:100%;
  margin-top:10px;
  padding:8px;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  margin-top:5px;
  padding:8px 15px;
  border:none;
  border-radius:10px;
  background:#2a5298;
  color:white;
  cursor:pointer;
}

button.mhs{
  background:#27ae60;
}

</style>
</head>
<body>

<h1>Dashboard Monitoring Skripsi</h1>

<div class="summary">
  <h2>Progress Keseluruhan</h2>
  <div class="progress-container">
    <div class="progress-bar" id="overallBar">0%</div>
  </div>
</div>

<div id="content">Memuat data...</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbz_pAsnHt8iu-RFv7WQYy_Hh9TeNPYdIqw2oWHtpK15gO82QNC7VRL2IVXaNQhfLGrfww/exec";

async function loadData(){

  const res = await fetch(API_URL);
  const data = await res.json();

  let html="";
  let total=0;
  let count=0;

  for(let i=1;i<data.length;i++){

    let tahap=data[i][0];
    let status=data[i][1];
    let chat=data[i][3] || "";
    let persen=parseInt(data[i][5]) || 0;

    total+=persen;
    count++;

    let statusClass=
      status.toLowerCase()=="selesai"?"selesai":
      status.toLowerCase()=="proses"?"proses":"belum";

    let chatArray=chat.split("\n").filter(c=>c.trim()!="");

    let chatHTML=chatArray.map(c=>{
      if(c.includes("DOSEN:")){
        return `<div class="bubble dosen">${c}</div><div style="clear:both"></div>`;
      }else{
        return `<div class="bubble mahasiswa">${c}</div><div style="clear:both"></div>`;
      }
    }).join("");

    html+=`
    <div class="card">
      <h3>${tahap}</h3>
      <span class="status ${statusClass}">${status}</span>
      <p><b>Progress:</b> ${persen}%</p>

      <div class="progress-container">
        <div class="progress-bar" style="width:${persen}%">${persen}%</div>
      </div>

      <div class="chat-box">
        ${chatHTML || "Belum ada diskusi"}
      </div>

      <textarea id="chat_${i}" rows="2" placeholder="Tulis pesan..."></textarea>

      <button onclick="sendChat(${i+1},${i},'DOSEN')">Kirim sebagai Dosen</button>
      <button class="mhs" onclick="sendChat(${i+1},${i},'Naufal')">Kirim sebagai Mahasiswa</button>
    </div>
    `;
  }

  document.getElementById("content").innerHTML=html;

  let overall=Math.round(total/count)||0;
  let bar=document.getElementById("overallBar");
  bar.style.width=overall+"%";
  bar.innerText=overall+"%";
}

async function sendChat(row,index,role){

  const textarea=document.getElementById("chat_"+index);
  const message=textarea.value.trim();

  if(message==""){
    alert("Pesan tidak boleh kosong");
    return;
  }

  await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      action:"append_chat",
      row:row,
      role:role,
      message:message
    })
  });

  textarea.value="";
  loadData();
}

loadData();

</script>

</body>
</html>
